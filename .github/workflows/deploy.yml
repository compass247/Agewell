name: Deploy

# Deploys the frontend (ECR + ECS) and backend Lambda on every push to main.
# Requires the infra to exist already (see infra/) and these repo settings:
#   Secrets:   AWS_DEPLOY_ROLE_ARN
#   Variables: AWS_REGION, ECR_REPOSITORY, ECS_CLUSTER, ECS_SERVICE,
#              LEAD_LAMBDA_NAME, API_BASE  (e.g. https://api.compassagewell.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write   # for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- Frontend: build, push, deploy ----------------
      - name: Build & push web image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
          API_BASE: ${{ vars.API_BASE }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPO:$SHA"
          docker build --build-arg VITE_API_BASE="$API_BASE" -t "$IMAGE" -t "$REGISTRY/$REPO:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$REPO:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Render new task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.ECS_SERVICE }}" \
            --query taskDefinition > taskdef.json
          # Drop fields the register call rejects, then swap in the new image.
          jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)
          ' taskdef.json > new-taskdef.json
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query taskDefinition.taskDefinitionArn --output text)
          echo "task_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.taskdef.outputs.task_arn }}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"

      # ---------------- Backend: package & update Lambda ----------------
      - name: Update lead Lambda
        working-directory: backend/lead-handler
        run: |
          npm ci --omit=dev
          zip -rq ../../lead-handler.zip . -x "build.mjs"
          cd ../..
          aws lambda update-function-code \
            --function-name "${{ vars.LEAD_LAMBDA_NAME }}" \
            --zip-file fileb://lead-handler.zip \
            --query 'LastModified' --output text
